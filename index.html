<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Interactive 3D Earth Map</title>
<style>
  :root { color-scheme: dark; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
  #app { position: fixed; inset: 0; }
  canvas { display: block; }

  /* Tooltip */
  #tooltip {
    position: fixed;
    pointer-events: none;
    z-index: 30;
    padding: 6px 10px;
    border-radius: 8px;
    background: rgba(10, 14, 22, 0.85);
    color: #eaf2ff;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.2px;
    border: 1px solid rgba(120, 170, 255, 0.35);
    box-shadow: 0 6px 20px rgba(0, 0, 0, 0.45);
    backdrop-filter: blur(6px);
    transform: translate(-50%, calc(-100% - 14px));
    opacity: 0;
    transition: opacity 0.12s ease;
    white-space: nowrap;
    max-width: 60vw;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  #tooltip.visible { opacity: 1; }

  /* HUD */
  #hud {
    position: fixed;
    top: 16px;
    left: 16px;
    z-index: 20;
    padding: 12px 14px;
    border-radius: 12px;
    background: rgba(10, 14, 22, 0.55);
    border: 1px solid rgba(120, 170, 255, 0.2);
    color: #cfe0ff;
    font-size: 12px;
    line-height: 1.5;
    backdrop-filter: blur(8px);
    max-width: 70vw;
  }
  #hud h1 { font-size: 14px; margin-bottom: 4px; color: #fff; }
  #hud .mode { margin-top: 6px; font-weight: 700; }
  #hud .mode b { color: #7fb4ff; }
  #hud .hint { opacity: 0.7; margin-top: 4px; }

  /* Loader */
  #loader {
    position: fixed;
    inset: 0;
    z-index: 50;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
    background: radial-gradient(circle at 50% 40%, #0b1730 0%, #000 70%);
    color: #cfe0ff;
    transition: opacity 0.6s ease;
  }
  #loader.hidden { opacity: 0; pointer-events: none; }
  .spinner {
    width: 42px; height: 42px;
    border: 3px solid rgba(127, 180, 255, 0.25);
    border-top-color: #7fb4ff;
    border-radius: 50%;
    animation: spin 0.9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loader .msg { font-size: 13px; opacity: 0.85; }

  @media (max-width: 600px) {
    #hud { font-size: 11px; padding: 10px; }
    #hud h1 { font-size: 13px; }
  }
</style>
</head>
<body>
<div id="app"></div>

<div id="hud">
  <h1>🌍 Interactive 3D Earth</h1>
  <div>Drag to rotate · Scroll / pinch to zoom</div>
  <div class="mode">View: <b id="modeLabel">Satellite</b></div>
  <div class="hint">Zoom in to reveal country borders and hover to explore.</div>
</div>

<div id="tooltip"></div>

<div id="loader">
  <div class="spinner"></div>
  <div class="msg" id="loaderMsg">Loading Earth…</div>
</div>

<!-- Three.js + OrbitControls via import map (ES modules from CDN) -->
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

/* ---------------------------------------------------------------
   Config
----------------------------------------------------------------*/
const EARTH_RADIUS = 2;
const GEO_RADIUS = EARTH_RADIUS + 0.006;       // borders sit just above surface
const MIN_DISTANCE = EARTH_RADIUS + 0.6;
const MAX_DISTANCE = 12;

// Zoom thresholds (camera distance). Closer = political, farther = satellite.
const POLITICAL_FULL = 3.6;   // <= this: political fully visible
const SATELLITE_FULL = 5.2;   // >= this: political fully hidden

// Texture sources (public CDNs). Falls back to a procedural texture on failure.
const TEX = {
  map: 'https://cdn.jsdelivr.net/gh/mrdoob/three.js@r160/examples/textures/planets/earth_atmos_2048.jpg',
  bump: 'https://cdn.jsdelivr.net/gh/mrdoob/three.js@r160/examples/textures/planets/earth_normal_2048.jpg',
  spec: 'https://cdn.jsdelivr.net/gh/mrdoob/three.js@r160/examples/textures/planets/earth_specular_2048.jpg',
  clouds: 'https://cdn.jsdelivr.net/gh/mrdoob/three.js@r160/examples/textures/planets/earth_clouds_1024.png',
  stars: 'https://cdn.jsdelivr.net/gh/mrdoob/three.js@r160/examples/textures/2294472375_24a3b8ef46_o.jpg'
};

const GEOJSON_URL = 'https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json'; // TopoJSON
const GEOJSON_FALLBACK = 'https://raw.githubusercontent.com/nvkelso/natural-earth-vector/master/geojson/ne_110m_admin_0_countries.geojson';

// Label thresholds: country names fade in as we approach the political view.
const LABEL_FADE_START = SATELLITE_FULL; // start showing labels at/below this distance
const LABEL_FADE_FULL = POLITICAL_FULL;  // fully opaque at/below this distance

/* ---------------------------------------------------------------
   Scene setup
----------------------------------------------------------------*/
const app = document.getElementById('app');
const tooltip = document.getElementById('tooltip');
const modeLabel = document.getElementById('modeLabel');
const loader = document.getElementById('loader');
const loaderMsg = document.getElementById('loaderMsg');

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.01, 1000);
camera.position.set(0, 1.5, 6);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;
app.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.rotateSpeed = 0.5;
controls.minDistance = MIN_DISTANCE;
controls.maxDistance = MAX_DISTANCE;
controls.enablePan = false;

/* ---------------------------------------------------------------
   Lighting
----------------------------------------------------------------*/
scene.add(new THREE.AmbientLight(0x223355, 1.1));
const sun = new THREE.DirectionalLight(0xffffff, 2.2);
sun.position.set(5, 3, 5);
scene.add(sun);
const rim = new THREE.DirectionalLight(0x4477ff, 0.5);
rim.position.set(-5, -2, -4);
scene.add(rim);

/* ---------------------------------------------------------------
   Starfield (real 3D stars surrounding the Earth in space)
----------------------------------------------------------------*/
function createStarfield(count = 8000, radius = 400) {
  const positions = new Float32Array(count * 3);
  const colors = new Float32Array(count * 3);
  const color = new THREE.Color();
  for (let i = 0; i < count; i++) {
    // Even distribution on a sphere shell
    const u = Math.random();
    const v = Math.random();
    const theta = 2 * Math.PI * u;
    const phi = Math.acos(2 * v - 1);
    const r = radius * (0.6 + Math.random() * 0.4);
    positions[i * 3]     = r * Math.sin(phi) * Math.cos(theta);
    positions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
    positions[i * 3 + 2] = r * Math.cos(phi);

    // Subtle star color variation (white -> blue/yellow tints)
    const tint = Math.random();
    if (tint > 0.92) color.setHSL(0.6, 0.55, 0.85);      // blue-ish
    else if (tint > 0.84) color.setHSL(0.09, 0.5, 0.82); // warm/yellow
    else color.setHSL(0, 0, 0.7 + Math.random() * 0.3);  // white-grey
    colors[i * 3] = color.r; colors[i * 3 + 1] = color.g; colors[i * 3 + 2] = color.b;
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
  const mat = new THREE.PointsMaterial({
    size: 1.1,
    sizeAttenuation: true,
    vertexColors: true,
    transparent: true,
    opacity: 0.95,
    depthWrite: false
  });
  return new THREE.Points(geo, mat);
}
const starfield = createStarfield();
scene.add(starfield);

/* ---------------------------------------------------------------
   Texture loading (with graceful fallback)
----------------------------------------------------------------*/
const texLoader = new THREE.TextureLoader();
texLoader.crossOrigin = 'anonymous';

function loadTexture(url) {
  return new Promise((resolve) => {
    texLoader.load(
      url,
      (t) => { t.colorSpace = THREE.SRGBColorSpace; resolve(t); },
      undefined,
      () => resolve(null)
    );
  });
}

function proceduralEarth() {
  const c = document.createElement('canvas');
  c.width = 1024; c.height = 512;
  const ctx = c.getContext('2d');
  const g = ctx.createLinearGradient(0, 0, 0, 512);
  g.addColorStop(0, '#0b3d91'); g.addColorStop(0.5, '#1565c0'); g.addColorStop(1, '#0b3d91');
  ctx.fillStyle = g; ctx.fillRect(0, 0, 1024, 512);
  ctx.fillStyle = '#2e7d32';
  for (let i = 0; i < 60; i++) {
    ctx.beginPath();
    ctx.ellipse(Math.random()*1024, Math.random()*512, Math.random()*80+20, Math.random()*50+15, 0, 0, Math.PI*2);
    ctx.fill();
  }
  const t = new THREE.CanvasTexture(c);
  t.colorSpace = THREE.SRGBColorSpace;
  return t;
}

/* ---------------------------------------------------------------
   Earth meshes
----------------------------------------------------------------*/
const earthGroup = new THREE.Group();
scene.add(earthGroup);

const earthGeo = new THREE.SphereGeometry(EARTH_RADIUS, 96, 96);
const earthMat = new THREE.MeshPhongMaterial({ shininess: 12, specular: new THREE.Color(0x223344) });
const earth = new THREE.Mesh(earthGeo, earthMat);
earthGroup.add(earth);

// Clouds
const cloudMat = new THREE.MeshPhongMaterial({ transparent: true, opacity: 0.4, depthWrite: false });
const clouds = new THREE.Mesh(new THREE.SphereGeometry(EARTH_RADIUS + 0.02, 96, 96), cloudMat);
earthGroup.add(clouds);

// Atmospheric glow (fresnel shader)
const atmosphere = new THREE.Mesh(
  new THREE.SphereGeometry(EARTH_RADIUS + 0.18, 96, 96),
  new THREE.ShaderMaterial({
    transparent: true,
    side: THREE.BackSide,
    blending: THREE.AdditiveBlending,
    uniforms: { glowColor: { value: new THREE.Color(0x3a86ff) } },
    vertexShader: `
      varying vec3 vNormal;
      void main() {
        vNormal = normalize(normalMatrix * normal);
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }`,
    fragmentShader: `
      varying vec3 vNormal;
      uniform vec3 glowColor;
      void main() {
        float intensity = pow(0.62 - dot(vNormal, vec3(0.0, 0.0, 1.0)), 3.0);
        gl_FragColor = vec4(glowColor, 1.0) * intensity;
      }`
  })
);
earthGroup.add(atmosphere);

/* ---------------------------------------------------------------
   Country borders group (political view)
----------------------------------------------------------------*/
const bordersGroup = new THREE.Group();
bordersGroup.visible = false;
earthGroup.add(bordersGroup);

const fillGroup = new THREE.Group();   // invisible meshes used for raycasting + highlight
earthGroup.add(fillGroup);

const lineBaseColor = new THREE.Color(0x8fd0ff);
const lineMat = new THREE.LineBasicMaterial({ color: lineBaseColor, transparent: true, opacity: 0 });

const highlightMat = new THREE.MeshBasicMaterial({
  color: 0x7fb4ff, transparent: true, opacity: 0.0, side: THREE.DoubleSide, depthWrite: false
});

/* ---------------------------------------------------------------
   Country name labels (sprites projected onto the globe)
----------------------------------------------------------------*/
const labelsGroup = new THREE.Group();
labelsGroup.visible = false;
earthGroup.add(labelsGroup);

const labelTextureCache = new Map();

function makeLabelTexture(text) {
  if (labelTextureCache.has(text)) return labelTextureCache.get(text);
  const pad = 12;
  const font = '600 30px -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif';
  const measure = document.createElement('canvas').getContext('2d');
  measure.font = font;
  const w = Math.ceil(measure.measureText(text).width) + pad * 2;
  const h = 30 + pad * 2;
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  const ctx = c.getContext('2d');
  ctx.font = font;
  ctx.textBaseline = 'middle';
  ctx.textAlign = 'center';
  // Soft dark halo for legibility over any terrain
  ctx.lineWidth = 5;
  ctx.strokeStyle = 'rgba(5, 10, 20, 0.9)';
  ctx.strokeText(text, w / 2, h / 2);
  ctx.fillStyle = '#eaf4ff';
  ctx.fillText(text, w / 2, h / 2);
  const tex = new THREE.CanvasTexture(c);
  tex.colorSpace = THREE.SRGBColorSpace;
  tex.minFilter = THREE.LinearFilter;
  const entry = { tex, aspect: w / h };
  labelTextureCache.set(text, entry);
  return entry;
}

// Area-weighted centroid of a lon/lat ring (for label placement)
function ringCentroid(ring) {
  let area = 0, cx = 0, cy = 0;
  for (let i = 0, n = ring.length - 1; i < n; i++) {
    const [x0, y0] = ring[i];
    const [x1, y1] = ring[i + 1];
    const cross = x0 * y1 - x1 * y0;
    area += cross;
    cx += (x0 + x1) * cross;
    cy += (y0 + y1) * cross;
  }
  if (Math.abs(area) < 1e-7) {
    // Degenerate: fall back to average of points
    let sx = 0, sy = 0;
    ring.forEach(([x, y]) => { sx += x; sy += y; });
    return [sx / ring.length, sy / ring.length];
  }
  area *= 0.5;
  return [cx / (6 * area), cy / (6 * area)];
}

function addCountryLabel(name, ring) {
  if (!ring || ring.length < 3) return;
  const [lon, lat] = ringCentroid(ring);
  const { tex, aspect } = makeLabelTexture(name);
  const mat = new THREE.SpriteMaterial({
    map: tex, transparent: true, opacity: 0, depthTest: false, depthWrite: false
  });
  const sprite = new THREE.Sprite(mat);
  const baseHeight = 0.07;
  sprite.scale.set(baseHeight * aspect, baseHeight, 1);
  const pos = lonLatToVec3(lon, lat, GEO_RADIUS + 0.02);
  sprite.position.copy(pos);
  sprite.userData.normal = pos.clone().normalize();
  labelsGroup.add(sprite);
}

/* ---------------------------------------------------------------
   Geo helpers
----------------------------------------------------------------*/
function lonLatToVec3(lon, lat, radius) {
  const phi = (90 - lat) * Math.PI / 180;
  const theta = (lon + 180) * Math.PI / 180;
  return new THREE.Vector3(
    -radius * Math.sin(phi) * Math.cos(theta),
     radius * Math.cos(phi),
     radius * Math.sin(phi) * Math.sin(theta)
  );
}

// Build line segments for one ring of [lon,lat] coordinates
function ringToLine(ring, radius) {
  const pts = [];
  for (let i = 0; i < ring.length; i++) {
    const [lon, lat] = ring[i];
    pts.push(lonLatToVec3(lon, lat, radius));
  }
  const geo = new THREE.BufferGeometry().setFromPoints(pts);
  return new THREE.Line(geo, lineMat);
}

// Build a (rough) filled mesh for a polygon ring, used only for hover hit-testing
function ringToFillMesh(ring, radius) {
  const shapePts = ring.map(([lon, lat]) => new THREE.Vector2(lon, lat));
  if (shapePts.length < 3) return null;
  const shape = new THREE.Shape(shapePts);
  const geo = new THREE.ShapeGeometry(shape, 6);
  const pos = geo.attributes.position;
  for (let i = 0; i < pos.count; i++) {
    const lon = pos.getX(i);
    const lat = pos.getY(i);
    const v = lonLatToVec3(lon, lat, radius);
    pos.setXYZ(i, v.x, v.y, v.z);
  }
  geo.computeVertexNormals();
  const mesh = new THREE.Mesh(geo, highlightMat.clone());
  return mesh;
}

function eachPolygon(geometry, cb) {
  if (!geometry) return;
  if (geometry.type === 'Polygon') {
    cb(geometry.coordinates);
  } else if (geometry.type === 'MultiPolygon') {
    geometry.coordinates.forEach(cb);
  }
}

function buildCountries(features) {
  features.forEach((feature) => {
    const name = (feature.properties && (feature.properties.name || feature.properties.NAME ||
      feature.properties.ADMIN || feature.properties.admin)) || 'Unknown';

    const countryLines = new THREE.Group();
    countryLines.userData.name = name;

    const countryFills = [];

    // Track the largest polygon so the label lands on the country's main body
    let largestRing = null;
    let largestArea = -Infinity;

    eachPolygon(feature.geometry, (polygon) => {
      // polygon = [outerRing, hole1, hole2, ...]
      polygon.forEach((ring) => {
        countryLines.add(ringToLine(ring, GEO_RADIUS));
      });
      // only outer ring used for hit-test fill
      const fill = ringToFillMesh(polygon[0], GEO_RADIUS);
      if (fill) {
        fill.userData.name = name;
        fill.userData.linesGroup = countryLines;
        fillGroup.add(fill);
        countryFills.push(fill);
      }
      // Approximate area (lon/lat) to pick the dominant landmass
      const ring = polygon[0];
      let a = 0;
      for (let i = 0, n = ring.length - 1; i < n; i++) {
        a += ring[i][0] * ring[i + 1][1] - ring[i + 1][0] * ring[i][1];
      }
      a = Math.abs(a);
      if (a > largestArea) { largestArea = a; largestRing = ring; }
    });

    if (largestRing) addCountryLabel(name, largestRing);

    countryLines.userData.fills = countryFills;
    bordersGroup.add(countryLines);
  });
}

/* ---------------------------------------------------------------
   TopoJSON -> GeoJSON (minimal inline decoder for world-atlas)
----------------------------------------------------------------*/
function topoToGeo(topology, objectName) {
  const obj = topology.objects[objectName];
  const arcs = topology.arcs;
  const transform = topology.transform;

  function decodeArc(arc) {
    const points = [];
    let x = 0, y = 0;
    for (let i = 0; i < arc.length; i++) {
      let [dx, dy] = arc[i];
      if (transform) {
        x += dx; y += dy;
        points.push([
          x * transform.scale[0] + transform.translate[0],
          y * transform.scale[1] + transform.translate[1]
        ]);
      } else {
        points.push([dx, dy]);
      }
    }
    return points;
  }

  const arcCache = arcs.map(decodeArc);

  function arcRing(arcIndexes) {
    let coords = [];
    arcIndexes.forEach((idx) => {
      let arc, reverse = idx < 0;
      arc = arcCache[reverse ? ~idx : idx];
      let pts = reverse ? arc.slice().reverse() : arc;
      if (coords.length) pts = pts.slice(1);
      coords = coords.concat(pts);
    });
    return coords;
  }

  function geomToFeature(geom) {
    let coordinates;
    if (geom.type === 'Polygon') {
      coordinates = geom.arcs.map(arcRing);
    } else if (geom.type === 'MultiPolygon') {
      coordinates = geom.arcs.map((poly) => poly.map(arcRing));
    } else {
      coordinates = [];
    }
    return {
      type: 'Feature',
      properties: geom.properties || { name: geom.id },
      geometry: { type: geom.type, coordinates }
    };
  }

  return obj.geometries.map(geomToFeature);
}

/* ---------------------------------------------------------------
   Data loading
----------------------------------------------------------------*/
async function loadCountries() {
  // Try TopoJSON (world-atlas) first — small & reliable.
  try {
    const res = await fetch(GEOJSON_URL);
    if (!res.ok) throw new Error('topo fetch failed');
    const topo = await res.json();
    const objName = topo.objects.countries ? 'countries' : Object.keys(topo.objects)[0];
    return topoToGeo(topo, objName);
  } catch (e) {
    // Fallback to raw GeoJSON
    const res = await fetch(GEOJSON_FALLBACK);
    const geo = await res.json();
    return geo.features;
  }
}

/* ---------------------------------------------------------------
   Raycasting / hover
----------------------------------------------------------------*/
const raycaster = new THREE.Raycaster();
const pointer = new THREE.Vector2();
let pointerInside = false;
let hovered = null;

function setPointer(clientX, clientY) {
  pointer.x = (clientX / window.innerWidth) * 2 - 1;
  pointer.y = -(clientY / window.innerHeight) * 2 + 1;
  tooltip.style.left = clientX + 'px';
  tooltip.style.top = clientY + 'px';
}

renderer.domElement.addEventListener('pointermove', (e) => {
  pointerInside = true;
  setPointer(e.clientX, e.clientY);
});
renderer.domElement.addEventListener('pointerleave', () => {
  pointerInside = false;
  clearHover();
});

function clearHover() {
  if (hovered) {
    hovered.userData.fills.forEach((f) => { f.material.opacity = 0; });
    hovered.children.forEach((l) => { l.material = lineMat; });
    hovered = null;
  }
  tooltip.classList.remove('visible');
}

const hoverLineMat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 1 });

function handleHover() {
  if (!politicalActive || !pointerInside) { clearHover(); return; }
  raycaster.setFromCamera(pointer, camera);
  const hits = raycaster.intersectObjects(fillGroup.children, false);
  if (hits.length) {
    const fill = hits[0].object;
    const group = fill.userData.linesGroup;
    if (group !== hovered) {
      clearHover();
      hovered = group;
      group.userData.fills.forEach((f) => { f.material.opacity = 0.28; });
      group.children.forEach((l) => { l.material = hoverLineMat; });
    }
    tooltip.textContent = fill.userData.name;
    tooltip.classList.add('visible');
  } else {
    clearHover();
  }
}

/* ---------------------------------------------------------------
   Zoom-dependent transition
----------------------------------------------------------------*/
let politicalActive = false;

function updateViewBlend() {
  const dist = camera.position.distanceTo(controls.target);
  // t = 1 => fully political, t = 0 => fully satellite
  let t = (SATELLITE_FULL - dist) / (SATELLITE_FULL - POLITICAL_FULL);
  t = Math.max(0, Math.min(1, t));

  bordersGroup.visible = t > 0.001;
  fillGroup.visible = t > 0.001;
  politicalActive = t > 0.5;

  // Fade border lines in/out
  lineMat.opacity = t * 0.9;
  hoverLineMat.opacity = Math.max(0.4, t);

  // Country name labels: fade in with zoom, hide ones on the far side of the globe
  labelsGroup.visible = t > 0.001;
  if (labelsGroup.visible) {
    const camDir = camera.position.clone().sub(controls.target).normalize();
    labelsGroup.children.forEach((sprite) => {
      // Dot of the (rotated) country normal vs camera direction => front-facing?
      const n = sprite.userData.normal.clone().applyQuaternion(earthGroup.quaternion);
      const facing = n.dot(camDir); // >0 means on the near hemisphere
      const faceFade = THREE.MathUtils.clamp((facing - 0.15) / 0.35, 0, 1);
      sprite.material.opacity = t * faceFade;
    });
  }

  // Dim clouds & soften satellite as we move into political mode
  cloudMat.opacity = 0.4 * (1 - t);
  earthMat.opacity = 1; // keep globe as backdrop

  modeLabel.textContent = t >= 0.5 ? 'Political' : (t > 0.02 ? 'Transitioning' : 'Satellite');
}

/* ---------------------------------------------------------------
   Resize
----------------------------------------------------------------*/
function onResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
}
window.addEventListener('resize', onResize);

/* ---------------------------------------------------------------
   Animation loop
----------------------------------------------------------------*/
const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();

  // Auto-rotate only when zoomed out & user not interacting much
  if (!politicalActive) {
    earthGroup.rotation.y += dt * 0.04;
  }
  clouds.rotation.y += dt * 0.01;

  controls.update();
  updateViewBlend();
  handleHover();
  renderer.render(scene, camera);
}

/* ---------------------------------------------------------------
   Init
----------------------------------------------------------------*/
async function init() {
  // Textures
  loaderMsg.textContent = 'Loading satellite imagery…';
  const [map, bump, spec, cloudTex, stars] = await Promise.all([
    loadTexture(TEX.map), loadTexture(TEX.bump), loadTexture(TEX.spec),
    loadTexture(TEX.clouds), loadTexture(TEX.stars)
  ]);

  earthMat.map = map || proceduralEarth();
  if (bump) { earthMat.normalMap = bump; earthMat.normalScale = new THREE.Vector2(0.85, 0.85); }
  if (spec) { earthMat.specularMap = spec; }
  earthMat.needsUpdate = true;

  if (cloudTex) { cloudMat.map = cloudTex; cloudMat.needsUpdate = true; }

  // Solid black space; the 3D starfield provides the stars.
  scene.background = new THREE.Color(0x000000);

  // Countries
  loaderMsg.textContent = 'Loading country boundaries…';
  try {
    const features = await loadCountries();
    buildCountries(features);
  } catch (e) {
    console.error('Failed to load GeoJSON', e);
  }

  loader.classList.add('hidden');
  setTimeout(() => loader.remove(), 700);

  animate();
}

init();
</script>
